<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="'Segoe UI', 'Microsoft JhengHei', sans-serif">
  <title id="ttl">C1 強制層開發管線（工程師版）</title>
  <desc id="desc">每個切片：讀快照、選切片並寫測試、實作、跑 checks.py（密鑰掃描/pytest/決策一致性），全 PASS 才能 git commit，pre-commit 再擋一次；失敗自己修迴圈；碰到重大事項升級給人並寫入 decisions.json。</desc>

  <rect x="0" y="0" width="720" height="800" fill="#ffffff"/>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <style>
    text{ fill:#1a1a1a; }
    .t{ font-size:13.5px; font-weight:600; }
    .s{ font-size:11px; fill:#555; }
    .m{ font-family:'Consolas','Courier New',monospace; font-size:11px; fill:#555; }
    .lbl{ font-size:10.5px; fill:#888; }
    .proc{ stroke:#999; stroke-width:1.5; fill:#ffffff; }
    .dia{ stroke:#999; stroke-width:1.5; fill:#f4f4f2; }
    .gate{ stroke:#D85A30; stroke-width:1.8; fill:#D85A30; fill-opacity:0.10; }
    .human{ stroke:#7F77DD; stroke-width:1.6; fill:#7F77DD; fill-opacity:0.10; }
    .done{ stroke:#1D9E75; stroke-width:1.8; fill:#1D9E75; fill-opacity:0.10; }
    .setup{ stroke:#999; stroke-width:1.4; stroke-dasharray:5 4; fill:none; }
    .fl{ stroke:#888; stroke-width:1.5; fill:none; }
  </style>

  <line class="fl" x1="260" y1="86"  x2="260" y2="112" marker-end="url(#a)"/>
  <line class="fl" x1="260" y1="156" x2="260" y2="182" marker-end="url(#a)"/>
  <line class="fl" x1="260" y1="298" x2="260" y2="324" marker-end="url(#a)"/>
  <line class="fl" x1="260" y1="368" x2="260" y2="392" marker-end="url(#a)"/>
  <line class="fl" x1="260" y1="524" x2="260" y2="550" marker-end="url(#a)"/>
  <line class="fl" x1="260" y1="594" x2="260" y2="614" marker-end="url(#a)"/>
  <line class="fl" x1="260" y1="674" x2="260" y2="700" marker-end="url(#a)"/>

  <rect class="setup" x="60" y="40" width="600" height="46" rx="8"/>
  <text class="t" x="76" y="60">一次性安裝（bootstrap）</text>
  <text class="m" x="76" y="78">git init  ·  .project/{checks,snapshot,decisions}  ·  .git/hooks/pre-commit</text>

  <rect class="proc" x="110" y="112" width="300" height="44" rx="7"/>
  <text class="t" x="126" y="132">1. 讀現狀</text>
  <text class="m" x="126" y="149">python .project/snapshot.py → CURRENT_STATE.md</text>

  <rect class="proc" x="110" y="182" width="300" height="44" rx="7"/>
  <text class="t" x="126" y="202">2. 選一個小切片 ＋ 寫具名測試</text>
  <text class="m" x="126" y="219">tests/test_*.py（驗收案例＝意圖鎖）</text>

  <path class="dia" d="M260,230 L410,262 L260,294 L110,262 Z"/>
  <text class="t" x="260" y="258" text-anchor="middle">重大事項 / 沒把握？</text>
  <text class="s" x="260" y="276" text-anchor="middle">DB・權限・金流・語意不明</text>
  <text class="lbl" x="272" y="314">否</text>

  <rect class="human" x="470" y="230" width="210" height="64" rx="8"/>
  <text class="t" x="486" y="252">絆線：停下，升級給人</text>
  <text class="s" x="486" y="270">人拍板 → 寫 decisions.json</text>
  <text class="m" x="486" y="286">status: confirmed</text>
  <line class="fl" x1="410" y1="262" x2="468" y2="262" marker-end="url(#a)"/>
  <text class="lbl" x="424" y="253">是</text>
  <polyline class="fl" points="575,294 575,340 412,340" marker-end="url(#a)"/>
  <text class="lbl" x="500" y="334">決策定案後繼續</text>

  <rect class="proc" x="110" y="324" width="300" height="44" rx="7"/>
  <text class="t" x="126" y="344">3. 實作這個切片</text>
  <text class="s" x="126" y="361">只動本切片範圍，不做無關重構</text>

  <rect class="gate" x="110" y="392" width="300" height="78" rx="7"/>
  <text class="t" x="126" y="412">4. 跑 checks.py〔強制關卡〕</text>
  <text class="m" x="126" y="430">· 密鑰掃描（git ls-files）</text>
  <text class="m" x="126" y="446">· pytest 驗收測試</text>
  <text class="m" x="126" y="462">· decisions.json ↔ 文件一致</text>

  <path class="dia" d="M260,458 L392,488 L260,518 L128,488 Z"/>
  <text class="t" x="260" y="493" text-anchor="middle">全部 PASS？</text>
  <text class="lbl" x="272" y="540">PASS</text>

  <polyline class="fl" points="128,488 92,488 92,346 108,346" marker-end="url(#a)"/>
  <text class="lbl" x="60" y="418" transform="rotate(-90 60 418)">FAIL → 自己修</text>

  <rect class="gate" x="110" y="550" width="300" height="44" rx="7"/>
  <text class="t" x="126" y="570">5. git commit〔pre-commit 再擋一次〕</text>
  <text class="m" x="126" y="587">commit 訊息＝一句人話（軌跡）</text>

  <path class="dia" d="M260,592 L392,622 L260,652 L128,622 Z"/>
  <text class="t" x="260" y="627" text-anchor="middle">驗收測試全綠？</text>
  <text class="lbl" x="272" y="694">是</text>

  <polyline class="fl" points="128,622 74,622 74,134 108,134" marker-end="url(#a)"/>
  <text class="lbl" x="44" y="400" transform="rotate(-90 44 400)">未完 → 下一切片</text>

  <rect class="done" x="110" y="700" width="300" height="46" rx="7"/>
  <text class="t" x="126" y="721">交付</text>
  <text class="s" x="126" y="738">可跑 ＋ checks 全 PASS ＋ commit 軌跡完整</text>

  <rect class="gate" x="470" y="704" width="13" height="13" rx="3"/>
  <text class="lbl" x="489" y="714">紅＝強制關卡（擋 commit）</text>
  <rect class="human" x="470" y="722" width="13" height="13" rx="3"/>
  <text class="lbl" x="489" y="732">紫＝需要人</text>
  <rect class="done" x="590" y="722" width="13" height="13" rx="3"/>
  <text class="lbl" x="609" y="732">綠＝完成</text>
</svg>
